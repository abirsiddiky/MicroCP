<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-[#0f172a] text-slate-300 font-sans antialiased h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-60 bg-[#1e293b] border-r border-[#334155] flex flex-col h-full flex-shrink-0 transition-all duration-300" id="sidebar">
        <div class="p-6 border-b border-[#334155] flex items-center space-x-3">
            <div class="w-8 h-8 bg-[#6366f1] rounded flex items-center justify-center font-bold text-white shadow-lg">μ</div>
            <span class="text-xl font-bold text-white tracking-tight">MicroCP</span>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 text-xs font-medium">
            <ul class="space-y-1">
                <li><a href="/" class="flex items-center px-6 py-2.5 text-white bg-[#6366f1] border-r-4 border-white"><span class="mr-3 opacity-70">▤</span> Dashboard</a></li>
                <li><a href="/websites" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">🌐</span> Websites</a></li>
                <li><a href="/wordpress" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">📝</span> WordPress</a></li>
                <li><a href="/databases" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">💾</span> Databases</a></li>
                <li><a href="/files" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">📁</span> Files</a></li>
                <li><a href="/ssl" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">🔒</span> SSL</a></li>
                <li><a href="/backups" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">📦</span> Backups</a></li>
                <li><a href="/cron" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">⏱️</span> Cron Jobs</a></li>
                <li><a href="/logs" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">📄</span> Logs</a></li>
                <li><a href="/security" class="flex items-center px-6 py-2.5 hover:bg-[#334155] transition-colors"><span class="mr-3 opacity-50">🛡️</span> Security</a></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-[#334155] text-[10px] text-slate-500 flex justify-between">
            <span>v1.2.4 (stable)</span>
            <span class="text-green-500">● Online</span>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 bg-[#0f172a] overflow-hidden">
        <!-- Topbar -->
        <header class="h-16 bg-[#1e293b] border-b border-[#334155] flex items-center justify-between px-8">
            <div class="flex items-center space-x-4">
                <button id="sidebar-toggle" class="mr-4 text-slate-500 hover:text-slate-300">☰</button>
                <h2 class="text-sm text-slate-400">Server: <span class="text-white font-mono">localhost</span></h2>
                <div class="h-4 w-px bg-[#334155]"></div>
                <span id="uptime" class="px-2 py-1 bg-green-500/10 text-green-400 text-[10px] rounded border border-green-500/20">UPTIME: --</span>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 hover:bg-[#334155] rounded">🌙</button>
                <a href="/logout" class="px-3 py-1.5 bg-red-500/10 text-red-400 text-xs border border-red-500/20 rounded hover:bg-red-500 hover:text-white transition-colors">Logout</a>
            </div>
        </header>

        <!-- Main Area -->
        <main class="flex-1 overflow-y-auto p-6 space-y-6">
            {{template "content" .}}
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
