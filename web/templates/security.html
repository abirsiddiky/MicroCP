{{define "content"}}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-white">Security</h1>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <div class="bg-[#1e293b] p-6 rounded border border-[#334155] shadow-sm">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">UFW Firewall</h3>
        <p class="text-slate-300 text-sm mb-4">Manage your server's incoming ports.</p>
        <button class="px-2 py-1 bg-[#6366f1] text-white text-xs font-bold rounded shadow-sm hover:bg-indigo-500">Configure Firewall</button>
    </div>
    <div class="bg-[#1e293b] p-6 rounded border border-[#334155] shadow-sm">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Fail2Ban</h3>
        <p class="text-slate-300 text-sm mb-4">Protect against brute-force attacks.</p>
        <button class="px-2 py-1 bg-[#6366f1] text-white text-xs font-bold rounded shadow-sm hover:bg-indigo-500">View Jails</button>
    </div>
</div>
{{end}}
