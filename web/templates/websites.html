{{define "content"}}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-white">Websites</h1>
    <a href="/websites/create" class="px-2 py-1 bg-[#6366f1] text-white text-xs font-bold rounded shadow-sm hover:bg-indigo-500">Add Website</a>
</div>
<div class="bg-[#1e293b] rounded border border-[#334155] overflow-hidden">
    <table class="w-full text-left text-xs">
        <thead class="bg-[#0f172a] text-slate-500 font-mono text-[10px]">
            <tr>
                <th class="px-4 py-2 border-b border-[#334155] uppercase tracking-wider">Domain</th>
                <th class="px-4 py-2 border-b border-[#334155] uppercase tracking-wider">PHP Version</th>
                <th class="px-4 py-2 border-b border-[#334155] uppercase tracking-wider">SSL</th>
                <th class="px-4 py-2 border-b border-[#334155] uppercase tracking-wider">Status</th>
                <th class="px-4 py-2 border-b border-[#334155] uppercase tracking-wider text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-[#334155]">
            <tr class="hover:bg-[#243146] transition-colors">
                <td class="px-4 py-3 text-slate-400 font-medium" colspan="5">No websites added yet.</td>
            </tr>
        </tbody>
    </table>
</div>
{{end}}
