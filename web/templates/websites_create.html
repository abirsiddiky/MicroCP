{{template "header.html" .}}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-white">Add New Website</h1>
    <div class="bg-[#1e293b] rounded border border-[#334155] p-6 shadow-sm">
        <form action="/websites/create" method="POST">
            <div class="mb-4">
                <label class="block mb-2 text-xs font-semibold text-slate-400 uppercase tracking-widest">Domain Name</label>
                <input type="text" name="domain" placeholder="example.com" class="w-full border border-[#334155] rounded px-3 py-2 bg-[#0f172a] text-slate-300 focus:outline-none focus:ring-1 focus:ring-[#6366f1]" required>
            </div>
            <div class="mb-6">
                <label class="block mb-2 text-xs font-semibold text-slate-400 uppercase tracking-widest">PHP Version</label>
                <select name="php_version" class="w-full border border-[#334155] rounded px-3 py-2 bg-[#0f172a] text-slate-300 focus:outline-none focus:ring-1 focus:ring-[#6366f1]">
                    <option value="8.2">PHP 8.2</option>
                    <option value="8.3">PHP 8.3</option>
                </select>
            </div>
            <button type="submit" class="w-full py-2 bg-[#6366f1] text-white text-xs font-bold rounded shadow-sm hover:bg-indigo-500 uppercase tracking-widest">Create Website</button>
        </form>
    </div>
</div>
{{template "footer.html" .}}
