<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MicroCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-[#0f172a] text-slate-300 font-sans flex items-center justify-center h-screen">
    <div class="w-96 p-8 bg-[#1e293b] rounded border border-[#334155] shadow-sm">
        <h2 class="text-2xl font-bold text-center mb-6 text-white tracking-tight"><span class="w-8 h-8 inline-flex bg-[#6366f1] rounded items-center justify-center font-bold text-white shadow-lg mr-2">μ</span> MicroCP</h2>
        {{if .Error}}
            <div class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded text-xs mb-4">{{.Error}}</div>
        {{end}}
        <form action="/login" method="POST">
            <div class="mb-4">
                <label class="block mb-2 text-xs font-semibold text-slate-400 uppercase tracking-widest">Password</label>
                <input type="password" name="password" class="w-full border border-[#334155] rounded px-3 py-2 bg-[#0f172a] text-slate-300 focus:outline-none focus:ring-1 focus:ring-[#6366f1]" required autofocus>
            </div>
            <button type="submit" class="w-full py-2 bg-[#6366f1] text-white text-xs font-bold rounded shadow-sm hover:bg-indigo-500 uppercase tracking-widest transition-colors">Login</button>
        </form>
    </div>
</body>
</html>
